<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0212"/>
      <stop offset="50%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0d0212"/>
    </linearGradient>
    <linearGradient id="pinkGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF10F0"/>
      <stop offset="50%" stop-color="#FF56D6"/>
      <stop offset="100%" stop-color="#C400FF"/>
    </linearGradient>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="10" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- circuit grid lines, faint -->
  <g stroke="#FF10F0" stroke-width="1" opacity="0.12">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="260" x2="1200" y2="260"/>
    <line x1="120" y1="0" x2="120" y2="300"/>
    <line x1="1080" y1="0" x2="1080" y2="300"/>
    <path d="M0,80 L60,80 L60,110 L180,110" fill="none"/>
    <path d="M1200,190 L1140,190 L1140,150 L1000,150" fill="none"/>
  </g>
  <g fill="#00F0FF" opacity="0.5">
    <circle cx="60" cy="80" r="3"/>
    <circle cx="180" cy="110" r="3"/>
    <circle cx="1140" cy="190" r="3"/>
    <circle cx="1000" cy="150" r="3"/>
  </g>

  <!-- corner brackets, hacker terminal feel -->
  <g stroke="#00F0FF" stroke-width="2" fill="none" opacity="0.8">
    <path d="M20,20 L20,50 M20,20 L50,20"/>
    <path d="M1180,20 L1180,50 M1180,20 L1150,20"/>
    <path d="M20,280 L20,250 M20,280 L50,280"/>
    <path d="M1180,280 L1180,250 M1180,280 L1150,280"/>
  </g>

  <!-- decorative gothic bow, top right -->
  <g transform="translate(1040,50) scale(0.9)" filter="url(#neon)">
    <path d="M0,0 C-30,-18 -55,-6 -50,14 C-46,30 -20,26 0,10 C20,26 46,30 50,14 C55,-6 30,-18 0,0 Z"
          fill="none" stroke="#FF10F0" stroke-width="3"/>
    <circle cx="0" cy="8" r="6" fill="#FF10F0"/>
    <path d="M-6,14 L-16,42 L-2,34 Z" fill="#FF10F0" opacity="0.85"/>
    <path d="M6,14 L16,42 L2,34 Z" fill="#FF10F0" opacity="0.85"/>
  </g>

  <!-- decorative gothic bow, bottom left -->
  <g transform="translate(110,240) scale(0.6)" filter="url(#softGlow)" opacity="0.6">
    <path d="M0,0 C-30,-18 -55,-6 -50,14 C-46,30 -20,26 0,10 C20,26 46,30 50,14 C55,-6 30,-18 0,0 Z"
          fill="none" stroke="#00F0FF" stroke-width="3"/>
    <circle cx="0" cy="8" r="6" fill="#00F0FF"/>
  </g>

  <!-- glitch offset layers behind main title -->
  <text x="598" y="150" font-family="Consolas, monospace" font-size="46" font-weight="bold"
        fill="#00F0FF" opacity="0.5" text-anchor="middle">MARIA CLARA CUPERTINO DA COSTA</text>
  <text x="602" y="146" font-family="Consolas, monospace" font-size="46" font-weight="bold"
        fill="#C400FF" opacity="0.5" text-anchor="middle">MARIA CLARA CUPERTINO DA COSTA</text>

  <!-- main title -->
  <text x="600" y="148" font-family="Consolas, monospace" font-size="46" font-weight="bold"
        fill="url(#pinkGlow)" text-anchor="middle" filter="url(#neon)">MARIA CLARA CUPERTINO DA COSTA</text>

  <!-- terminal prompt subtitle -->
  <text x="600" y="195" font-family="Consolas, monospace" font-size="20"
        fill="#FF56D6" text-anchor="middle" opacity="0.95">
    &gt; defesa cibernética · blue team · caçando ameaças_
  </text>

  <!-- tagline -->
  <text x="600" y="228" font-family="Consolas, monospace" font-size="14"
        fill="#00F0FF" text-anchor="middle" opacity="0.75" letter-spacing="2">
    FIAP · DEFESA CIBERNÉTICA · SOC ANALYST IN TRAINING
  </text>

  <!-- blinking-style cursor decoration -->
  <rect x="808" y="182" width="10" height="20" fill="#FF10F0" opacity="0.9"/>
</svg>
