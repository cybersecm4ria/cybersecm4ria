<svg viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="diagBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF10F0"/>
      <stop offset="45%" stop-color="#C400FF"/>
      <stop offset="100%" stop-color="#FF10F0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="200" fill="#0d0212"/>

  <!-- diagonal ribbon shapes top and bottom, like the reference -->
  <polygon points="0,55 900,15 900,45 0,85" fill="url(#diagBg)"/>
  <polygon points="0,150 900,120 900,150 0,180" fill="url(#diagBg)" opacity="0.85"/>

  <!-- glitch offset text layers -->
  <text x="454" y="110" font-family="Consolas, monospace" font-size="22" font-weight="bold" letter-spacing="3"
        fill="#00F0FF" opacity="0.55" text-anchor="middle">&lt; welcome to maria's cyber world /&gt;</text>
  <text x="447" y="105" font-family="Consolas, monospace" font-size="22" font-weight="bold" letter-spacing="3"
        fill="#C400FF" opacity="0.55" text-anchor="middle">&lt; welcome to maria's cyber world /&gt;</text>
  <text x="450" y="107" font-family="Consolas, monospace" font-size="22" font-weight="bold" letter-spacing="3"
        fill="url(#diagBg)" text-anchor="middle" filter="url(#glow)">&lt; welcome to maria's cyber world /&gt;</text>

  <!-- small bow accent -->
  <g transform="translate(790,45) scale(0.55)" filter="url(#glow)">
    <path d="M0,0 C-30,-18 -55,-6 -50,14 C-46,30 -20,26 0,10 C20,26 46,30 50,14 C55,-6 30,-18 0,0 Z"
          fill="none" stroke="#FF10F0" stroke-width="3"/>
    <circle cx="0" cy="8" r="6" fill="#FF10F0"/>
  </g>
</svg>
